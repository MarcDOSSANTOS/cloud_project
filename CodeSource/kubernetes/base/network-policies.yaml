# ============================================
# Network Policies - Sécurité réseau TechShop
# ============================================
# Principe du moindre privilège : chaque service ne peut
# communiquer qu'avec les services dont il a besoin.
# ============================================

# Politique par défaut : bloquer tout le trafic dans le namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: techshop
  labels:
    app.kubernetes.io/part-of: techshop
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Autoriser le DNS pour tous les pods (nécessaire pour la résolution de noms)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: techshop
  labels:
    app.kubernetes.io/part-of: techshop
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# Frontend : reçoit le trafic de l'Ingress, accède à l'API Gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-policy
  namespace: techshop
  labels:
    app.kubernetes.io/part-of: techshop
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 80
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - port: 3000

---
# API Gateway : reçoit du Frontend/Ingress, accède aux 3 microservices
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-policy
  namespace: techshop
  labels:
    app.kubernetes.io/part-of: techshop
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: frontend
      ports:
        - port: 3000
    # Trafic depuis l'Ingress Controller (namespace différent)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: user-service
      ports:
        - port: 8001
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: product-service
      ports:
        - port: 8002
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: order-service
      ports:
        - port: 8003

---
# User Service : reçoit de l'API Gateway, accède à la DB et au cache
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: user-service-policy
  namespace: techshop
  labels:
    app.kubernetes.io/part-of: techshop
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: user-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - port: 8001
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: database
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: cache
      ports:
        - port: 6379

---
# Product Service : reçoit de l'API Gateway, accède à la DB et au cache
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: product-service-policy
  namespace: techshop
  labels:
    app.kubernetes.io/part-of: techshop
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: product-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - port: 8002
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: database
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: cache
      ports:
        - port: 6379

---
# Order Service : reçoit de l'API Gateway, accède à la DB, cache et RabbitMQ
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: order-service-policy
  namespace: techshop
  labels:
    app.kubernetes.io/part-of: techshop
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: order-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - port: 8003
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: database
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: cache
      ports:
        - port: 6379
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: message-queue
      ports:
        - port: 5672

---
# Database : reçoit des 3 microservices uniquement
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: database-policy
  namespace: techshop
  labels:
    app.kubernetes.io/part-of: techshop
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: database
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: user-service
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: product-service
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: order-service
      ports:
        - port: 5432

---
# Cache : reçoit des 3 microservices uniquement
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cache-policy
  namespace: techshop
  labels:
    app.kubernetes.io/part-of: techshop
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cache
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: user-service
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: product-service
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: order-service
      ports:
        - port: 6379

---
# Message Queue : reçoit du order-service uniquement
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: message-queue-policy
  namespace: techshop
  labels:
    app.kubernetes.io/part-of: techshop
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: message-queue
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: order-service
      ports:
        - port: 5672
