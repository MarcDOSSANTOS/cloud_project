apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: techshop
  labels:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/part-of: techshop
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: order-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: order-service
        app.kubernetes.io/part-of: techshop
        app.kubernetes.io/component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: order-service
          image: ghcr.io/techshop/order-service:latest
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: techshop-config
            - secretRef:
                name: techshop-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
