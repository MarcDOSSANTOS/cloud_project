apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: techshop
  labels:
    app.kubernetes.io/name: user-service
    app.kubernetes.io/part-of: techshop
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: user-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: user-service
        app.kubernetes.io/part-of: techshop
        app.kubernetes.io/component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: user-service
          image: ghcr.io/techshop/user-service:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: techshop-config
            - secretRef:
                name: techshop-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: techshop-config
                  key: DATABASE_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          securityContext:
            readOnlyRootFilesystem: false
