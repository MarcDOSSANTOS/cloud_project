apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: techshop
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: techshop
    app.kubernetes.io/component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/part-of: techshop
        app.kubernetes.io/component: gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: api-gateway
          image: ghcr.io/techshop/api-gateway:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: techshop-config
            - secretRef:
                name: techshop-secrets
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: production
          livenessProbe:
            httpGet:
              path: /api
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
