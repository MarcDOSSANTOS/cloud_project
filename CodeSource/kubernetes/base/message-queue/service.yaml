apiVersion: v1
kind: Service
metadata:
  name: message-queue
  namespace: techshop
  labels:
    app.kubernetes.io/name: message-queue
    app.kubernetes.io/part-of: techshop
    app.kubernetes.io/component: message-queue
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: message-queue
    app.kubernetes.io/part-of: techshop
    app.kubernetes.io/component: message-queue
  ports:
    - port: 5672
      targetPort: 5672
      protocol: TCP
      name: amqp
    - port: 15672
      targetPort: 15672
      protocol: TCP
      name: management
