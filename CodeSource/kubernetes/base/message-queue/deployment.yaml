apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: message-queue
  namespace: techshop
  labels:
    app.kubernetes.io/name: message-queue
    app.kubernetes.io/part-of: techshop
    app.kubernetes.io/component: message-queue
spec:
  serviceName: message-queue
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: message-queue
      app.kubernetes.io/part-of: techshop
      app.kubernetes.io/component: message-queue
  template:
    metadata:
      labels:
        app.kubernetes.io/name: message-queue
        app.kubernetes.io/part-of: techshop
        app.kubernetes.io/component: message-queue
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.12-management-alpine
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_DEFAULT_PASS
          livenessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - -q
                - ping
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - -q
                - check_running
            initialDelaySeconds: 30
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
