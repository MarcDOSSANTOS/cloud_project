# ============================================
# TechShop - Docker Compose (développement local)
# ============================================
# Usage :
#   docker compose up -d          → Démarrer tous les services
#   docker compose up -d --build  → Rebuild et démarrer
#   docker compose logs -f        → Voir les logs
#   docker compose down           → Arrêter tout
#   docker compose ps             → Voir l'état des services
# ============================================

services:
  # ==========================================
  # Infrastructure
  # ==========================================

  database:
    image: postgres:16-alpine
    container_name: techshop-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: techshop
      POSTGRES_USER: techshop
      POSTGRES_PASSWORD: techshop_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techshop"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - techshop-network

  cache:
    image: redis:7-alpine
    container_name: techshop-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - techshop-network

  message-queue:
    image: rabbitmq:3.12-management-alpine
    container_name: techshop-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"   # Interface de management
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - techshop-network

  # ==========================================
  # Microservices applicatifs
  # ==========================================

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
      args:
        BUILD_DATE: "${BUILD_DATE:-}"
        VERSION: "${VERSION:-1.0.0}"
        VCS_REF: "${VCS_REF:-}"
    container_name: techshop-user-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://techshop:techshop_password@database:5432/techshop
      JWT_SECRET: techshop-secret-key-change-in-production
      REDIS_URL: redis://cache:6379
    ports:
      - "8001:8001"
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - techshop-network

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
      args:
        BUILD_DATE: "${BUILD_DATE:-}"
        VERSION: "${VERSION:-1.0.0}"
        VCS_REF: "${VCS_REF:-}"
    container_name: techshop-product-service
    restart: unless-stopped
    environment:
      DB_HOST: database
      DB_PORT: "5432"
      DB_NAME: techshop
      DB_USERNAME: techshop
      DB_PASSWORD: techshop_password
      REDIS_HOST: cache
      REDIS_PORT: "6379"
    ports:
      - "8002:8002"
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8002/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - techshop-network

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
      args:
        BUILD_DATE: "${BUILD_DATE:-}"
        VERSION: "${VERSION:-1.0.0}"
        VCS_REF: "${VCS_REF:-}"
    container_name: techshop-order-service
    restart: unless-stopped
    environment:
      DB_HOST: database
      DB_PORT: "5432"
      DB_NAME: techshop
      DB_USERNAME: techshop
      DB_PASSWORD: techshop_password
      RABBITMQ_URL: amqp://guest:guest@message-queue:5672/
      REDIS_URL: redis://cache:6379
    ports:
      - "8003:8003"
    depends_on:
      database:
        condition: service_healthy
      message-queue:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - techshop-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
      args:
        BUILD_DATE: "${BUILD_DATE:-}"
        VERSION: "${VERSION:-1.0.0}"
        VCS_REF: "${VCS_REF:-}"
    container_name: techshop-api-gateway
    restart: unless-stopped
    environment:
      PORT: "3000"
      NODE_ENV: production
      JWT_SECRET: techshop-secret-key-change-in-production
      USER_SERVICE_URL: http://user-service:8001
      PRODUCT_SERVICE_URL: http://product-service:8002
      ORDER_SERVICE_URL: http://order-service:8003
    ports:
      - "3000:3000"
    depends_on:
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - techshop-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BUILD_DATE: "${BUILD_DATE:-}"
        VERSION: "${VERSION:-1.0.0}"
        VCS_REF: "${VCS_REF:-}"
    container_name: techshop-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - techshop-network

  # ==========================================
  # Monitoring
  # ==========================================

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: techshop-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - techshop-network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: techshop-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - techshop-network

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: techshop-alertmanager
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager:ro
    ports:
      - "9093:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    networks:
      - techshop-network

  # ==========================================
  # Centralisation des logs (Loki + Promtail)
  # ==========================================

  loki:
    image: grafana/loki:3.3.0
    container_name: techshop-loki
    restart: unless-stopped
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - techshop-network

  promtail:
    image: grafana/promtail:3.3.0
    container_name: techshop-promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - techshop-network

# ==========================================
# Volumes persistants
# ==========================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local

# ==========================================
# Réseau
# ==========================================
networks:
  techshop-network:
    driver: bridge
    name: techshop-network
